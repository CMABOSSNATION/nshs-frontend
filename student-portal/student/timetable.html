<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Timetable — NSHS Student Portal</title>
  <link rel="stylesheet" href="../../css/style.css"/>
  <link rel="stylesheet" href="student.css"/>
</head>
<body>
<div class="portal-layout">
  <div class="portal-sidebar-overlay" id="sidebarOverlay"></div>
  <aside class="portal-sidebar" id="sidebar">
    <div class="portal-sidebar-header">
      <div class="portal-sidebar-logo"><img src="../../images/logo.jpg" alt="NSHS" onerror="this.style.display='none'"/></div>
      <div><div class="portal-sidebar-title">NSHS Portal</div><div class="portal-sidebar-sub">To Serve & Care</div></div>
    </div>
    <nav class="portal-nav">
      <a href="dashboard.html" class="portal-nav-item"><span>🏠</span> Dashboard</a>
      <a href="results.html" class="portal-nav-item"><span>📋</span> My Results</a>
      <a href="fees.html" class="portal-nav-item"><span>💰</span> Fees & Payments</a>
      <a href="timetable.html" class="portal-nav-item active"><span>🗓️</span> Timetable</a>
      <a href="documents.html" class="portal-nav-item"><span>📄</span> My Documents</a>
      <a href="profile.html" class="portal-nav-item"><span>👤</span> My Profile</a>
    </nav>
    <div class="portal-sidebar-footer">
      <div class="portal-sidebar-user">
        <div class="portal-user-avatar" id="userInitial">S</div>
        <div><div class="portal-user-name" id="userName">Student</div><div class="portal-user-no" id="userNo">—</div></div>
        <span class="portal-logout" onclick="logout()">🚪</span>
      </div>
    </div>
  </aside>
  <div class="portal-main">
    <div class="portal-topbar">
      <button class="portal-menu-btn" id="sidebarToggle">☰</button>
      <div class="portal-topbar-title">My Timetable</div>
    </div>
    <div class="portal-content">
      <div id="ttDays"></div>
    </div>
  </div>
</div>
<div class="toast-container" id="toastContainer"></div>
<script src="../../js/api.js"></script>
<script src="student.js"></script>
<script>
  PORTAL.init();
  async function loadTimetable() {
    const container = document.getElementById('ttDays');
    container.innerHTML = '<div class="portal-loader"><div class="spinner"></div></div>';
    try {
      const data = await API.get(API.STUDENT_TIMETABLE, API.getToken());
      if (!data.success || !data.data?.length) {
        container.innerHTML = '<div class="portal-card"><div class="portal-card-body" style="text-align:center;padding:40px;color:var(--gray-400)">No timetable published yet for your programme.</div></div>';
        return;
      }
      const byDay = {};
      data.data.forEach(t => { (byDay[t.day] = byDay[t.day] || []).push(t); });
      container.innerHTML = Object.entries(byDay).map(([day, classes]) => `
        <div class="portal-card" style="margin-bottom:16px">
          <div class="portal-card-header"><span>${day}</span></div>
          <div class="portal-card-body">
            ${classes.map(c => `
              <div style="display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid var(--cream-dark)">
                <div><strong style="font-size:13px">${c.course_name}</strong><br><small style="color:var(--gray-400)">${c.course_code} • Room ${c.room||'—'}</small></div>
                <span style="font-family:var(--font-heading);font-weight:600;color:var(--navy);font-size:13px">${c.start_time?.substring(0,5)} - ${c.end_time?.substring(0,5)}</span>
              </div>`).join('')}
          </div>
        </div>`).join('');
    } catch {
      container.innerHTML = '<div class="portal-card"><div class="portal-card-body" style="color:#ef4444;text-align:center;padding:30px">Failed to load timetable</div></div>';
    }
  }
  loadTimetable();
</script>
</body>
</html>
